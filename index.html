    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline by Intent Analyzer | AirOps</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --amber: #f59e0b;
            --amber-dim: rgba(245, 158, 11, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --cyan: #06b6d4;
            --cyan-dim: rgba(6, 182, 212, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header h1 span { color: var(--text-dim); font-weight: 400; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .badge {
            font-size: 11px; padding: 4px 10px;
            border-radius: 20px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-live { background: var(--green-dim); color: var(--green); }
        .badge-source { background: var(--accent-glow); color: var(--accent); }
        .timestamp { color: var(--text-dim); font-size: 13px; }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 24px 32px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; }
        .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
        .stat-value.green { color: var(--green); }
        .stat-value.amber { color: var(--amber); }
        .stat-value.accent { color: var(--accent); }
        .stat-value.cyan { color: var(--cyan); }

        /* Controls */
        .controls {
            padding: 0 32px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            width: 280px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-dim); }
        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--text);
            background: var(--accent-glow);
        }
        .sort-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            margin-left: auto;
        }

        /* Table */
        .table-container {
            padding: 0 32px 32px;
        }
        .lead-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .lead-table thead th {
            background: var(--surface-2);
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .lead-table thead th:hover { color: var(--text); }
        .lead-table thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
        .lead-table thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
        .lead-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .lead-table tbody tr:hover { background: var(--surface-2); }
        .lead-table tbody tr:last-child { border-bottom: none; }
        .lead-table td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }

        /* Rank */
        .rank {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px;
        }
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
        .rank-other { background: var(--surface-2); color: var(--text-dim); }

        /* Score bar */
        .score-cell { display: flex; align-items: center; gap: 10px; }
        .score-bar-bg {
            width: 80px; height: 6px;
            background: var(--surface-2);
            border-radius: 3px;
            overflow: hidden;
        }
        .score-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .score-num { font-weight: 700; font-size: 15px; min-width: 32px; }
        .score-high .score-bar { background: linear-gradient(90deg, var(--green), #4ade80); }
        .score-high .score-num { color: var(--green); }
        .score-med .score-bar { background: linear-gradient(90deg, var(--amber), #fbbf24); }
        .score-med .score-num { color: var(--amber); }
        .score-low .score-bar { background: linear-gradient(90deg, var(--red), #f87171); }
        .score-low .score-num { color: var(--text-dim); }

        /* Lead info */
        .lead-name { font-weight: 600; margin-bottom: 2px; }
        .lead-email { color: var(--text-dim); font-size: 12px; }
        .lead-company { color: var(--cyan); font-size: 12px; }

        /* Signals */
        .signals { display: flex; flex-wrap: wrap; gap: 4px; max-width: 320px; }
        .signal-tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
            white-space: nowrap;
        }
        .signal-hot { background: var(--green-dim); color: var(--green); }
        .signal-warm { background: var(--amber-dim); color: var(--amber); }
        .signal-info { background: var(--accent-glow); color: var(--accent); }
        .signal-neutral { background: var(--surface-2); color: var(--text-dim); }

        /* Source badge */
        .source-badge {
            font-size: 11px; padding: 4px 10px;
            border-radius: 6px; font-weight: 500;
            display: inline-block;
        }
        .src-organic { background: var(--green-dim); color: var(--green); }
        .src-paid { background: var(--amber-dim); color: var(--amber); }
        .src-direct { background: var(--cyan-dim); color: var(--cyan); }
        .src-email { background: var(--accent-glow); color: var(--accent); }
        .src-referral { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .src-social { background: rgba(236, 72, 153, 0.15); color: #ec4899; }
        .src-offline { background: var(--surface-2); color: var(--text-dim); }
        .src-ai { background: rgba(99, 102, 241, 0.2); color: #818cf8; }

        /* Metric cells */
        .metric { text-align: center; font-variant-numeric: tabular-nums; }
        .metric-highlight { color: var(--green); font-weight: 600; }

        /* Lifecycle */
        .lc-mql { color: var(--green); font-weight: 600; }
        .lc-lead { color: var(--amber); }
        .lc-nurture { color: var(--accent); }
        .lc-subscriber { color: var(--text-dim); }

        /* Expand row */
        .expand-btn {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 16px; padding: 4px;
            transition: transform 0.2s, color 0.2s;
        }
        .expand-btn:hover { color: var(--text); }
        .expand-btn.open { transform: rotate(90deg); }
        .detail-row { display: none; }
        .detail-row.open { display: table-row; }
        .detail-row td {
            padding: 16px 16px 16px 60px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .detail-item { }
        .detail-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .detail-value { font-size: 13px; }
        .detail-value a { color: var(--accent); text-decoration: none; }
        .detail-value a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .signals { max-width: 200px; }
        }
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .controls { flex-direction: column; }
            .search-box { width: 100%; }
        }
    </style>

const SOURCE_LABELS = {
    'ORGANIC_SEARCH': 'Organic Search',
    'PAID_SEARCH': 'Paid Search',
    'DIRECT_TRAFFIC': 'Direct Traffic',
    'EMAIL_MARKETING': 'Email Marketing',
    'REFERRALS': 'Referrals',
    'SOCIAL_MEDIA': 'Social Media',
    'PAID_SOCIAL': 'Paid Social',
    'AI_REFERRALS': 'AI Referrals',
    'OFFLINE': 'Offline',
    'OTHER_CAMPAIGNS': 'Other Campaigns'
};

const SOURCE_CLASSES = {
    'ORGANIC_SEARCH': 'src-organic',
    'PAID_SEARCH': 'src-paid',
    'DIRECT_TRAFFIC': 'src-direct',
    'EMAIL_MARKETING': 'src-email',
    'REFERRALS': 'src-referral',
    'SOCIAL_MEDIA': 'src-social',
    'PAID_SOCIAL': 'src-social',
    'AI_REFERRALS': 'src-ai',
    'OFFLINE': 'src-offline',
    'OTHER_CAMPAIGNS': 'src-offline'
};

const LIFECYCLE_LABELS = {
    'marketingqualifiedlead': 'MQL',
    'lead': 'Lead',
    '1232155415': 'Nurture',
    'subscriber': 'Subscriber'
};

const LIFECYCLE_CLASSES = {
    'marketingqualifiedlead': 'lc-mql',
    'lead': 'lc-lead',
    '1232155415': 'lc-nurture',
    'subscriber': 'lc-subscriber'
};

let currentFilter = 'all';
let currentSort = 'score-desc';
let searchQuery = '';

function classifySignal(sig) {
    const s = sig.toLowerCase();
    if (s.includes('pricing') || s.includes('demo') || s.includes('compare') || s.includes('enterprise') || s.includes('contact'))
        return 'signal-hot';
    if (s.includes('this week') || s.includes('form submission') || s.includes('mql'))
        return 'signal-hot';
    if (s.includes('email click') || s.includes('sessions') || s.includes('page view'))
        return 'signal-warm';
    if (s.includes('src:'))
        return 'signal-neutral';
    return 'signal-info';
}

function getScoreClass(score) {
    if (score >= 120) return 'score-high';
    if (score >= 100) return 'score-med';
    return 'score-low';
}

function formatDate(d) {
    if (!d) return 'N/A';
    const date = new Date(d);
    const now = new Date();
    const diff = (now - date) / (1000 * 60 * 60);
    if (diff < 1) return 'Just now';
    if (diff < 24) return `${Math.floor(diff)}h ago`;
    if (diff < 168) return `${Math.floor(diff / 24)}d ago`;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderStats(leads) {
    const maxScore = Math.max(...leads.map(l => l.score));
    const avgScore = Math.round(leads.reduce((s, l) => s + l.score, 0) / leads.length);
    const mqls = leads.filter(l => l.lifecycle === 'marketingqualifiedlead').length;
    const activeThisWeek = leads.filter(l => {
        const sig = l.signals.join(' ');
        return sig.includes('this week');
    }).length;

    document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
            <div class="stat-label">Top Intent Score</div>
            <div class="stat-value green">${maxScore}</div>
            <div class="stat-sub">${leads[0]?.name || '-'}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg Intent Score</div>
            <div class="stat-value amber">${avgScore}</div>
            <div class="stat-sub">across ${leads.length} leads</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">MQLs in Pool</div>
            <div class="stat-value accent">${mqls}</div>
            <div class="stat-sub">${Math.round(mqls/leads.length*100)}% of total</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active This Week</div>
            <div class="stat-value cyan">${activeThisWeek}</div>
            <div class="stat-sub">visited or clicked recently</div>
        </div>
    `;
}

function renderLeads(leads) {
    const maxScore = Math.max(...LEADS_DATA.map(l => l.score));
    const tbody = document.getElementById('leads-tbody');
    tbody.innerHTML = '';

    leads.forEach((lead, idx) => {
        const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : 'rank-other';
        const scoreClass = getScoreClass(lead.score);
        const pct = Math.round((lead.score / maxScore) * 100);
        const srcClass = SOURCE_CLASSES[lead.source] || 'src-offline';
        const srcLabel = SOURCE_LABELS[lead.source] || lead.source || 'Unknown';
        const lcClass = LIFECYCLE_CLASSES[lead.lifecycle] || 'lc-subscriber';
        const lcLabel = LIFECYCLE_LABELS[lead.lifecycle] || lead.lifecycle || '-';

        // Filter out src: signals for the signal tags (shown separately)
        const displaySignals = lead.signals.filter(s =>
            !s.startsWith('src:') &&
            s !== 'MQL' && s !== 'Lead' && s !== 'Nurture' && s !== 'Subscriber'
        );

        const row = document.createElement('tr');
        row.innerHTML = `
            <td><div class="rank ${rankClass}">${idx + 1}</div></td>
            <td>
                <div class="score-cell ${scoreClass}">
                    <span class="score-num">${lead.score}</span>
                    <div class="score-bar-bg"><div class="score-bar" style="width:${pct}%"></div></div>
                </div>
            </td>
            <td>
                <div class="lead-name">${lead.name}</div>
                <div class="lead-email">${lead.email}</div>
                ${lead.company ? `<div class="lead-company">${lead.company}</div>` : ''}
            </td>
            <td><span class="source-badge ${srcClass}">${srcLabel}</span></td>
            <td><span class="${lcClass}">${lcLabel}</span></td>
            <td class="metric ${lead.page_views >= 100 ? 'metric-highlight' : ''}">${lead.page_views.toLocaleString()}</td>
            <td class="metric ${lead.sessions >= 20 ? 'metric-highlight' : ''}">${lead.sessions}</td>
            <td class="metric ${lead.email_clicks >= 3 ? 'metric-highlight' : ''}">${lead.email_clicks}</td>
            <td>
                <div class="signals">
                    ${displaySignals.slice(0, 5).map(s => `<span class="signal-tag ${classifySignal(s)}">${s}</span>`).join('')}
                    ${displaySignals.length > 5 ? `<span class="signal-tag signal-neutral">+${displaySignals.length - 5} more</span>` : ''}
                </div>
            </td>
            <td><button class="expand-btn" data-id="${lead.id}">&#9654;</button></td>
        `;
        tbody.appendChild(row);

        const detailRow = document.createElement('tr');
        detailRow.className = 'detail-row';
        detailRow.id = `detail-${lead.id}`;
        detailRow.innerHTML = `
            <td colspan="10">
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="detail-label">Last Page Visited</div>
                        <div class="detail-value"><a href="${lead.last_url}" target="_blank">${lead.last_url ? new URL(lead.last_url).pathname.slice(0, 50) : 'N/A'}</a></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Last Visit</div>
                        <div class="detail-value">${formatDate(lead.last_visit)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Last Email Click</div>
                        <div class="detail-value">${formatDate(lead.last_email_click)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Emails Opened</div>
                        <div class="detail-value">${lead.email_opens}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Recent Form</div>
                        <div class="detail-value">${lead.recent_form || 'N/A'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">All Signals</div>
                        <div class="detail-value">${lead.signals.join(', ')}</div>
                    </div>
                </div>
            </td>
        `;
        tbody.appendChild(detailRow);
    });
}

function filterAndSort() {
    let filtered = [...LEADS_DATA];

    // Search
    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(l =>
            l.name.toLowerCase().includes(q) ||
            l.email.toLowerCase().includes(q) ||
            (l.company || '').toLowerCase().includes(q) ||
            l.signals.some(s => s.toLowerCase().includes(q))
        );
    }

    // Filter
    switch (currentFilter) {
        case 'mql':
            filtered = filtered.filter(l => l.lifecycle === 'marketingqualifiedlead');
            break;
        case 'lead':
            filtered = filtered.filter(l => l.lifecycle === 'lead');
            break;
        case 'nurture':
            filtered = filtered.filter(l => l.lifecycle === '1232155415');
            break;
        case 'pricing':
            filtered = filtered.filter(l => l.signals.some(s => s.includes('/pricing')));
            break;
        case 'email-active':
            filtered = filtered.filter(l => l.signals.some(s => s.includes('email click this week')));
            break;
    }

    // Sort
    switch (currentSort) {
        case 'score-desc': filtered.sort((a, b) => b.score - a.score); break;
        case 'score-asc': filtered.sort((a, b) => a.score - b.score); break;
        case 'pageviews-desc': filtered.sort((a, b) => b.page_views - a.page_views); break;
        case 'sessions-desc': filtered.sort((a, b) => b.sessions - a.sessions); break;
        case 'clicks-desc': filtered.sort((a, b) => b.email_clicks - a.email_clicks); break;
    }

    renderStats(filtered);
    renderLeads(filtered);
}

// Event Listeners
document.getElementById('search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    filterAndSort();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        filterAndSort();
    });
});

document.getElementById('sort-select').addEventListener('change', (e) => {
    currentSort = e.target.value;
    filterAndSort();
});

document.addEventListener('click', (e) => {
    if (e.target.classList.contains('expand-btn')) {
        const id = e.target.dataset.id;
        const detail = document.getElementById(`detail-${id}`);
        detail.classList.toggle('open');
        e.target.classList.toggle('open');
    }
});

// Init
document.getElementById('timestamp').textContent = `Updated: ${new Date().toLocaleString()}`;
filterAndSort();
</script>
</body>
